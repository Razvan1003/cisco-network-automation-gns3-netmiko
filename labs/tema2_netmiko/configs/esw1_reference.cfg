hostname ESW1
!
no ip domain-lookup
!
vlan 10
vlan 20
!
interface FastEthernet1/0
 switchport mode access
 switchport access vlan 10
 no shutdown
!
interface FastEthernet1/1
 switchport mode access
 switchport access vlan 20
 no shutdown
!
interface FastEthernet1/2
 switchport mode trunk
 no shutdown
!
end
